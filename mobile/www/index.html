<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0f172a" />
    <title>rvchain</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: linear-gradient(165deg, #052e16 0%, #0f172a 45%, #1a1030 100%);
        color: #e2e8f0;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 0.5rem;
        letter-spacing: -0.03em;
      }
      p {
        color: #94a3b8;
        font-size: 0.95rem;
        line-height: 1.5;
        max-width: 20rem;
        margin: 0 auto 1.25rem;
      }
      a {
        display: inline-block;
        background: #16a34a;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
        padding: 0.85rem 1.4rem;
        border-radius: 1rem;
      }
      .tag {
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #4ade80;
        margin-bottom: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="tag">Family road life</div>
      <h1>rvchain</h1>
      <p>
        If the live app does not load, open the site in your browser. Capacitor is usually
        configured to load https://rv-chain.com automatically.
      </p>
      <a href="https://rv-chain.com">Open rvchain</a>
    </div>
  </body>
</html>
